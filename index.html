<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>5:00:00 Exact Aggregator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { background-color: #0D1117; color: #C9D1D9; font-family: sans-serif; }
        .card-5am { border: 1px solid #30363D; background: #161B22; border-top: 4px solid #238636; }
        .da-mono { font-family: 'JetBrains Mono', monospace; background: #0D1117; color: #58A6FF; border: 1px solid #30363D; }
    </style>
</head>
<body class="p-4">

    <header class="max-w-6xl mx-auto mb-8 border-b border-[#30363D] pb-4 flex justify-between items-center">
        <div>
            <h1 class="text-2xl font-black text-white tracking-tighter italic">5:00:00 <span class="text-green-500">EXACT</span></h1>
            <p class="text-[10px] text-gray-500 font-bold uppercase tracking-widest">開始時間 05:00:00 のデータのみを抽出中</p>
        </div>
        <button onclick="location.reload()" class="bg-[#21262D] text-[10px] px-3 py-1.5 rounded-md border border-[#30363D] hover:bg-[#30363D]">RESET</button>
    </header>

    <main class="max-w-6xl mx-auto">
        <div id="drop-area" class="border-2 border-dashed border-[#30363D] rounded-3xl p-16 text-center hover:border-green-500 transition-all cursor-pointer bg-[#0D1117]">
            <div class="text-5xl mb-4">⏱️</div>
            <p class="text-xl font-bold text-white">ここにExcelをドロップ</p>
            <p class="text-sm text-gray-500 mt-2">5:00:00指定の荷物だけを即座に仕分けます</p>
            <input type="file" id="file-input" class="hidden" accept=".xlsx, .xls, .csv">
        </div>

        <div id="result-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 mt-8"></div>
    </main>

    <script>
        const fileInput = document.getElementById('file-input');
        const dropArea = document.getElementById('drop-area');

        dropArea.onclick = () => fileInput.click();
        fileInput.onchange = (e) => {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = (ev) => {
                const data = new Uint8Array(ev.target.result);
                const workbook = XLSX.read(data, { type: 'array', cellDates: true });
                const json = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
                processStrict(json);
            };
            reader.readAsArrayBuffer(file);
        };

        function processStrict(data) {
            const grid = document.getElementById('result-grid');
            grid.innerHTML = '';
            
            const summary = data.reduce((acc, row) => {
                const startTimeRaw = row['Scheduled Delivery Start Time'];
                let isFiveAM = false;

                // 日付オブジェクトまたは文字列から「05:00:00」を厳密に判定
                if (startTimeRaw instanceof Date) {
                    if (startTimeRaw.getHours() === 5 && startTimeRaw.getMinutes() === 0) isFiveAM = true;
                } else {
                    const timeStr = String(startTimeRaw || "");
                    if (timeStr.includes("05:00:00") || timeStr.includes(" 5:00:00")) isFiveAM = true;
                }

                if (isFiveAM) {
                    const cx = row['Route Code'] || '未割当';
                    const name = row['Last Scan By'] || '担当者不明';
                    const da = row['Tracking ID'] || 'N/A';

                    if (!acc[cx]) acc[cx] = { name, items: [] };
                    acc[cx].items.push(da);
                }
                return acc;
            }, {});

            const entries = Object.entries(summary).sort();

            if (entries.length === 0) {
                grid.innerHTML = '<div class="col-span-full text-center py-20 text-gray-500 font-bold">5:00:00指定の荷物は1件もありませんでした。</div>';
                return;
            }

            entries.forEach(([cx, info]) => {
                const card = document.createElement('div');
                card.className = 'card-5am p-5 rounded-2xl shadow-2xl';
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-4 border-b border-[#30363D] pb-3">
                        <div>
                            <h2 class="text-lg font-black text-white italic">${cx} 担当者</h2>
                            <p class="text-xs text-gray-400 font-medium">${info.name}</p>
                        </div>
                        <div class="text-right">
                            <span class="bg-[#238636] text-white text-[10px] px-2.5 py-1 rounded-full font-black uppercase">5:00:00 | ${info.items.length}件</span>
                        </div>
                    </div>
                    <div class="grid grid-cols-1 gap-2">
                        ${info.items.map(da => `<div class="da-mono p-2 rounded-lg text-xs font-bold text-center italic tracking-wider">${da}</div>`).join('')}
                    </div>
                `;
                grid.appendChild(card);
            });

            dropArea.classList.add('hidden');
        }
    </script>
</body>
</html>
