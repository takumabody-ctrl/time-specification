<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>AMZ-EXP Perfect Status Matcher</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        .cx-card { border-top: 4px solid #30363D; background: #161B22; }
        .badge { font-size: 10px; padding: 2px 6px; border-radius: 4px; font-weight: bold; }
        /* エクセルのStateに合わせた色分け */
        .status-delivered { background: #238636; color: white; } /* 完了 */
        .status-transit { background: #9e6a03; color: white; }   /* 配送中 */
        .status-other { background: #444c56; color: #adbac7; }   /* その他 */
    </style>
</head>
<body class="bg-[#0D1117] text-[#C9D1D9] p-4">

    <header class="max-w-6xl mx-auto mb-6 flex justify-between items-end border-b border-[#30363D] pb-4">
        <div>
            <h1 class="text-xl font-black text-white italic uppercase">5:00 <span class="text-blue-500">Status Sync</span></h1>
            <p id="file-info" class="text-[10px] text-gray-500 font-bold mt-1 uppercase">エクセルのState列を100%反映中</p>
        </div>
        <div id="update-time" class="text-xs font-mono text-gray-500">--:--:--</div>
    </header>

    <main class="max-w-6xl mx-auto">
        <div id="drop-area" class="border-2 border-dashed border-[#30363D] rounded-xl p-8 text-center hover:bg-[#161B22] cursor-pointer mb-6 transition-all">
            <p class="text-white font-bold text-sm">最新のエクセルをドロップして更新</p>
            <input type="file" id="file-input" class="hidden" accept=".xlsx, .xls, .csv">
        </div>

        <div id="result-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
    </main>

    <script>
        const fileInput = document.getElementById('file-input');
        const dropArea = document.getElementById('drop-area');

        dropArea.onclick = () => fileInput.click();
        fileInput.onchange = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                const data = new Uint8Array(ev.target.result);
                const workbook = XLSX.read(data, { type: 'array', cellDates: true });
                const json = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
                document.getElementById('update-time').innerText = new Date().toLocaleTimeString();
                render(json);
            };
            reader.readAsArrayBuffer(file);
            fileInput.value = '';
        };

        function render(data) {
            const grid = document.getElementById('result-grid');
            grid.innerHTML = '';
            const summary = {};

            data.forEach(row => {
                const startTimeKey = Object.keys(row).find(k => k.trim().includes('Start Time'));
                const val = row[startTimeKey];
                
                let isMatch = false;
                if (val) {
                    const s = String(val);
                    // 5時台のデータを抽出
                    if (s.match(/([ 0]5:00| 5:00)/) || (val instanceof Date && val.getHours() === 5)) {
                        isMatch = true;
                    }
                }

                if (isMatch) {
                    const cx = row['Route Code'] || '未割当';
                    const name = row['Last Scan By'] || '不明';
                    const da = row['Tracking ID'] || 'Unknown';
                    const state = String(row['State'] || '不明'); // エクセルのStateをそのまま取得

                    if (!summary[cx]) summary[cx] = { name, items: [] };
                    summary[cx].items.push({ da, state });
                }
            });

            Object.keys(summary).sort((a,b) => (parseInt(a.replace(/\D/g,'')) || 0) - (parseInt(b.replace(/\D/g,'')) || 0)).forEach(cx => {
                const info = summary[cx];
                const card = document.createElement('div');
                card.className = 'cx-card p-4 rounded-xl shadow-lg';
                
                const itemsHtml = info.items.map(item => {
                    // ステータスに応じたクラス分け（完全一致判定）
                    let statusClass = 'status-other';
                    let displayStatus = item.state;

                    if (item.state === 'Delivered') {
                        statusClass = 'status-delivered';
                        displayStatus = '完了';
                    } else if (item.state.includes('In Transit') || item.state.includes('Out for Delivery')) {
                        statusClass = 'status-transit';
                        displayStatus = '配送中';
                    }

                    return `
                        <div class="flex justify-between items-center bg-[#0D1117] p-2 rounded border border-[#30363D] mb-1">
                            <span class="text-[11px] font-mono text-[#58A6FF]">${item.da}</span>
                            <span class="badge ${statusClass}">${displayStatus}</span>
                        </div>
                    `;
                }).join('');

                card.innerHTML = `
                    <div class="flex justify-between items-center mb-3 border-b border-[#30363D] pb-2">
                        <div>
                            <h2 class="text-sm font-black text-white italic">${cx}</h2>
                            <p class="text-[10px] text-gray-500">${info.name}</p>
                        </div>
                        <div class="text-right">
                            <span class="text-xl font-black text-white leading-none">${info.items.length}</span>
                            <span class="text-[8px] text-gray-500 block uppercase font-bold">Total</span>
                        </div>
                    </div>
                    <div class="max-h-60 overflow-y-auto pr-1">${itemsHtml}</div>
                `;
                grid.appendChild(card);
            });
        }
    </script>
</body>
</html>
