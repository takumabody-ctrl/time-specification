<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>5:00 Monitor - Screenshot Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { background-color: #0D1117; color: #C9D1D9; font-family: 'Inter', sans-serif; }
        .cx-card { 
            background: #161B22; 
            border: 2px solid #30363D; 
            border-left: 8px solid #238636;
            transition: transform 0.1s;
        }
        .delivered-bar { height: 6px; background: #238636; border-radius: 3px; }
        .transit-bar { height: 6px; background: #9e6a03; border-radius: 3px; }
        /* 文字の太さとエッジを強調 */
        .font-heavy { font-weight: 900; letter-spacing: -0.02em; }
    </style>
</head>
<body class="p-4">

    <header class="flex justify-between items-center border-b-2 border-[#30363D] pb-3 mb-4">
        <div class="flex items-baseline gap-4">
            <h1 class="text-3xl font-heavy text-white italic uppercase">5:00 <span class="text-green-500">Master</span></h1>
            <span id="file-name" class="text-xs text-gray-500 font-bold truncate max-w-[300px]">READY</span>
        </div>
        <div class="flex gap-3">
            <button onclick="location.reload()" class="bg-red-600 text-white text-xs font-black px-4 py-2 rounded hover:bg-red-700 uppercase">Reset</button>
            <div id="clock" class="text-xl font-mono font-bold bg-[#161B22] px-3 py-1 rounded border border-[#30363D]">00:00:00</div>
        </div>
    </header>

    <main>
        <div id="drop-area" class="border-4 border-dashed border-[#30363D] rounded-2xl p-6 text-center hover:bg-[#161B22] cursor-pointer mb-6">
            <p id="drop-text" class="text-white text-lg font-black underline italic">ここに【抽出時】エクセルをドロップ</p>
            <input type="file" id="file-input" class="hidden" accept=".xlsx, .xls, .csv">
        </div>

        <div id="result-grid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4"></div>
    </main>

    <script>
        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);

        const fileInput = document.getElementById('file-input');
        const dropArea = document.getElementById('drop-area');

        dropArea.onclick = () => fileInput.click();
        fileInput.onchange = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            document.getElementById('file-name').innerText = file.name;
            const reader = new FileReader();
            reader.onload = (ev) => {
                const data = new Uint8Array(ev.target.result);
                const workbook = XLSX.read(data, { type: 'array', cellDates: true });
                const json = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
                render(json);
                dropArea.classList.add('hidden');
            };
            reader.readAsArrayBuffer(file);
            fileInput.value = '';
        };

        function render(data) {
            const grid = document.getElementById('result-grid');
            grid.innerHTML = '';
            const summary = {};

            data.forEach(row => {
                const startTimeKey = Object.keys(row).find(k => k.trim().includes('Scheduled Delivery Start Time'));
                const val = row[startTimeKey];
                
                let isMatch = false;
                if (val) {
                    const s = String(val);
                    if (s.includes("05:00") || (val instanceof Date && val.getHours() === 5)) {
                        isMatch = true;
                    }
                }

                if (isMatch) {
                    const cx = String(row['Route Code'] || '未割当');
                    const name = row['Last Scan By'] || '不明';
                    const state = String(row['State'] || '');
                    if (!summary[cx]) summary[cx] = { name, items: [] };
                    summary[cx].items.push({ state });
                }
            });

            Object.keys(summary).sort((a,b) => (parseInt(a.replace(/\D/g,'')) || 0) - (parseInt(b.replace(/\D/g,'')) || 0)).forEach(cx => {
                const info = summary[cx];
                const total = info.items.length;
                const deliveredCount = info.items.filter(i => i.state === 'Delivered').length;
                const transitCount = total - deliveredCount;

                // 完了率の計算
                const deliveredWidth = (deliveredCount / total) * 100;

                const card = document.createElement('div');
                card.className = 'cx-card p-4 rounded-xl shadow-lg';
                card.innerHTML = `
                    <div class="flex justify-between items-center mb-3">
                        <div>
                            <span class="text-3xl font-heavy text-white italic block leading-none">${cx}</span>
                            <span class="text-sm text-gray-400 font-bold mt-1 block">${info.name}</span>
                        </div>
                        <div class="text-right">
                            <span class="text-4xl font-heavy text-green-500 leading-none">${total}</span>
                            <span class="text-[10px] text-gray-500 block font-black uppercase">Packages</span>
                        </div>
                    </div>
                    
                    <div class="space-y-2">
                        <div class="flex w-full bg-[#30363D] rounded-full overflow-hidden h-3">
                            <div class="delivered-bar" style="width: ${deliveredWidth}%"></div>
                        </div>
                        <div class="flex justify-between font-bold text-sm">
                            <div class="flex items-center gap-2">
                                <span class="text-green-500">完了 ${deliveredCount}</span>
                                <span class="text-gray-600">|</span>
                                <span class="text-orange-500">未完 ${transitCount}</span>
                            </div>
                            <div class="text-white bg-[#238636] px-2 rounded text-xs flex items-center">
                                ${Math.round(deliveredWidth)}%
                            </div>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }
    </script>
</body>
</html>
