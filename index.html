<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Delivery Aggregator | Smart Monitor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        :root { --amz-orange: #FF9900; --bg-dark: #0D1117; }
        body { background-color: var(--bg-dark); color: #C9D1D9; font-family: 'SF Pro Display', -apple-system, sans-serif; letter-spacing: -0.02em; }
        .driver-card { background: #161B22; border: 1px solid #30363D; border-radius: 12px; transition: all 0.2s ease; }
        .driver-card:hover { border-color: #58A6FF; box-shadow: 0 0 15px rgba(88, 166, 255, 0.1); }
        .da-tag { background: #0D1117; border: 1px solid #30363D; color: #58A6FF; font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; padding: 2px 6px; border-radius: 4px; }
        .loader-spin { border-top-color: #FF9900; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="p-4">

    <header class="max-w-6xl mx-auto mb-6 flex justify-between items-center border-b border-[#30363D] pb-4">
        <div>
            <h1 class="text-xl font-black text-white tracking-tight uppercase">Smart Aggregator</h1>
            <p class="text-[10px] text-gray-500 font-bold uppercase tracking-widest">Efficiency Mode Activated</p>
        </div>
        <button onclick="location.reload()" class="text-[10px] font-bold bg-[#30363D] hover:bg-[#444c56] text-white px-3 py-1.5 rounded transition-all">SYSTEM RESET</button>
    </header>

    <main class="max-w-6xl mx-auto">
        <div id="drop-area" class="relative border-2 border-dashed border-[#30363D] rounded-2xl p-12 text-center hover:bg-[#161B22]/50 transition-all cursor-pointer">
            <input type="file" id="file-input" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer" accept="image/*,.xlsx">
            <div id="idle-view" class="space-y-3">
                <div class="text-4xl">📸</div>
                <p class="text-sm font-bold text-gray-400">画像をドロップ または 選択</p>
            </div>
            <div id="loading-view" class="hidden space-y-4">
                <div class="loader-spin w-8 h-8 border-4 border-gray-700 rounded-full mx-auto"></div>
                <p class="text-orange-500 font-black text-xs animate-pulse">EXTRACTING DATA...</p>
            </div>
        </div>

        <div id="summary-header" class="hidden my-6 flex gap-4 overflow-x-auto pb-2"></div>

        <div id="result-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3"></div>
    </main>

    <script>
        const State = {
            data: [],
            update(newData) {
                this.data = newData;
                this.render();
            },
            render() {
                const grid = document.getElementById('result-grid');
                const summary = document.getElementById('summary-header');
                grid.innerHTML = '';
                summary.innerHTML = '';

                if (this.data.length === 0) return;

                // CXごとにグループ化
                const grouped = this.data.reduce((acc, item) => {
                    if (!acc[item.cx]) acc[item.cx] = [];
                    acc[item.cx].push(item.da);
                    return acc;
                }, {});

                // 全体統計の表示
                summary.classList.remove('hidden');
                const totalPackages = this.data.length;
                const totalDrivers = Object.keys(grouped).length;
                summary.innerHTML = `
                    <div class="bg-[#238636] text-white px-3 py-1 rounded text-[10px] font-black whitespace-nowrap">TOTAL: ${totalPackages} PKGS</div>
                    <div class="bg-[#1f6feb] text-white px-3 py-1 rounded text-[10px] font-black whitespace-nowrap">DRIVERS: ${totalDrivers}</div>
                `;

                // カードの生成
                Object.entries(grouped).sort().forEach(([cx, das]) => {
                    const card = document.createElement('div');
                    card.className = 'driver-card p-4 flex flex-col gap-3';
                    card.innerHTML = `
                        <div class="flex justify-between items-center border-b border-[#30363D] pb-2">
                            <span class="text-sm font-black text-white">👤 ${cx} 担当者</span>
                            <span class="bg-[#238636] text-[10px] text-white font-bold px-2 py-0.5 rounded-full">合計 ${das.length} 個</span>
                        </div>
                        <div class="grid grid-cols-2 gap-1">
                            ${das.map(da => `<span class="da-tag truncate text-center">${da}</span>`).join('')}
                        </div>
                    `;
                    grid.appendChild(card);
                });

                document.getElementById('drop-area').classList.add('hidden');
            }
        };

        const fileInput = document.getElementById('file-input');
        fileInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            document.getElementById('idle-view').classList.add('hidden');
            document.getElementById('loading-view').classList.remove('hidden');

            try {
                if (file.type.startsWith('image/')) {
                    const worker = await Tesseract.createWorker('jpn');
                    const { data: { text } } = await worker.recognize(file);
                    console.log("Debug OCR:", text);
                    const parsed = parseText(text);
                    State.update(parsed);
                    await worker.terminate();
                } else {
                    // Excel処理（既存ロジックを継承）
                    processExcel(file);
                }
            } catch (err) {
                alert("解析エラー: 画像が不鮮明か、形式が正しくありません。");
            } finally {
                document.getElementById('loading-view').classList.add('hidden');
                document.getElementById('idle-view').classList.remove('hidden');
            }
        });

        function parseText(text) {
            // 解析戦略: 行ごとに分割し、DA番号(英数字)と名前(日本語)のペアを探す
            const lines = text.split('\n').map(l => l.trim()).filter(l => l.length > 5);
            const results = [];

            lines.forEach(line => {
                // OCR補正: D4をDAに置換、空白削除
                let cleanLine = line.replace(/D4/g, 'DA').replace(/\s+/g, ' ');
                
                // DA番号の抽出 (英数9〜15桁程度を想定)
                const daMatch = cleanLine.match(/DA[A-Z0-9]{5,}/i);
                // 名前の抽出 (漢字、カタカナの連続)
                const cxMatch = cleanLine.match(/[一-龠ぁ-んァ-ヶ]{2,}/);

                if (daMatch) {
                    results.push({
                        da: daMatch[0].toUpperCase(),
                        cx: cxMatch ? cxMatch[0] : "未特定"
                    });
                }
            });
            return results;
        }

        function processExcel(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                const json = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], { header: 1 });
                const parsed = json.slice(1).map(row => ({
                    da: String(row[0] || "").trim(),
                    cx: String(row[1] || "未特定").trim()
                })).filter(i => i.da);
                State.update(parsed);
            };
            reader.readAsArrayBuffer(file);
        }
    </script>
</body>
</html>
