<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>AMZ-EXP Perfect Matcher</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        .cx-card { border-left: 6px solid #238636; background: #161B22; }
        .status-badge { font-size: 10px; padding: 1px 6px; border-radius: 4px; }
        .delivered { background: #052147; color: #58A6FF; }
        .transit { background: #3b2306; color: #ffa657; }
    </style>
</head>
<body class="bg-[#0D1117] text-[#C9D1D9] p-4">

    <header class="max-w-6xl mx-auto mb-6 border-b border-[#30363D] pb-4 flex justify-between items-end">
        <div>
            <h1 class="text-2xl font-black text-white italic tracking-tighter">5:00 <span class="text-green-500">MASTER</span></h1>
            <p id="file-info" class="text-xs text-gray-500 font-bold mt-1 uppercase">待機中...</p>
        </div>
        <div class="text-right text-[10px] font-mono text-gray-500">
            LOGISTICS MONITOR V4.0
        </div>
    </header>

    <main class="max-w-6xl mx-auto">
        <div id="drop-area" class="border-2 border-dashed border-[#30363D] rounded-2xl p-10 text-center hover:border-green-500 transition-all cursor-pointer bg-[#0D1117]">
            <p class="text-white font-bold">Excelをドロップして全件照合</p>
            <input type="file" id="file-input" class="hidden" accept=".xlsx, .xls, .csv">
        </div>

        <div id="result-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 mt-8"></div>
    </main>

    <script>
        const fileInput = document.getElementById('file-input');
        const dropArea = document.getElementById('drop-area');

        dropArea.onclick = () => fileInput.click();
        fileInput.onchange = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                const data = new Uint8Array(ev.target.result);
                const workbook = XLSX.read(data, { type: 'array', cellDates: true });
                const json = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
                render(json, file.name);
            };
            reader.readAsArrayBuffer(file);
            fileInput.value = '';
        };

        function render(data, fileName) {
            const grid = document.getElementById('result-grid');
            grid.innerHTML = '';
            const summary = {};

            data.forEach(row => {
                // 列名のゆらぎを吸収
                const startTimeKey = Object.keys(row).find(k => k.trim().includes('Start Time'));
                const val = row[startTimeKey];
                
                let isMatch = false;
                if (val) {
                    const s = String(val);
                    // 1. 文字列としての判定 (5:00, 05:00, 5:00:00 等すべてカバー)
                    if (s.match(/([ 0]5:00| 5:00)/)) {
                        isMatch = true;
                    } 
                    // 2. 日付オブジェクトとしての判定 (5時台ならすべてOK)
                    else if (val instanceof Date && val.getHours() === 5) {
                        isMatch = true;
                    }
                }

                if (isMatch) {
                    const cx = row['Route Code'] || '未割当';
                    const name = row['Last Scan By'] || '不明';
                    const da = row['Tracking ID'] || 'Unknown';
                    const state = row['State'] || '不明';

                    if (!summary[cx]) summary[cx] = { name, items: [] };
                    summary[cx].items.push({ da, state });
                }
            });

            document.getElementById('file-info').innerText = `照合完了: ${fileName}`;

            Object.keys(summary).sort((a, b) => {
                const numA = parseInt(a.replace('CX', '')) || 0;
                const numB = parseInt(b.replace('CX', '')) || 0;
                return numA - numB;
            }).forEach(cx => {
                const info = summary[cx];
                const card = document.createElement('div');
                card.className = 'cx-card p-4 rounded-xl shadow-2xl';
                
                const itemsHtml = info.items.map(item => {
                    const isDelivered = item.state.includes('Delivered');
                    return `
                        <div class="flex justify-between items-center bg-[#0D1117] p-2 rounded border border-[#30363D] mb-1">
                            <span class="text-[11px] font-mono text-[#58A6FF]">${item.da}</span>
                            <span class="status-badge font-bold ${isDelivered ? 'delivered' : 'transit'}">
                                ${isDelivered ? '完了' : '配送中'}
                            </span>
                        </div>
                    `;
                }).join('');

                card.innerHTML = `
                    <div class="flex justify-between items-center mb-3 border-b border-[#30363D] pb-2">
                        <div>
                            <h2 class="text-sm font-black text-white italic">${cx}</h2>
                            <p class="text-[10px] text-gray-500">${info.name} 担当</p>
                        </div>
                        <div class="text-right">
                            <span class="text-green-500 text-lg font-black leading-none">${info.items.length}</span>
                            <span class="text-[8px] text-gray-500 block uppercase">Packages</span>
                        </div>
                    </div>
                    <div>${itemsHtml}</div>
                `;
                grid.appendChild(card);
            });
        }
    </script>
</body>
</html>
