<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMZ-EXP Time-Check Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { background-color: #0D1117; color: #C9D1D9; font-family: sans-serif; }
        .card-update { animation: fadeIn 0.4s ease-out; border-top: 4px solid #238636; background: #161B22; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .da-tag { background: #0D1117; border: 1px solid #30363D; color: #58A6FF; font-family: 'Courier New', monospace; }
    </style>
</head>
<body class="p-4">

    <header class="max-w-6xl mx-auto mb-6 border-b border-[#30363D] pb-4 flex justify-between items-center">
        <div>
            <h1 class="text-xl font-black text-white italic tracking-tighter uppercase">Delivery <span class="text-green-500">Monitor</span></h1>
            <p id="file-status" class="text-[10px] text-gray-500 font-bold uppercase tracking-widest">ファイルを待機中...</p>
        </div>
        <button onclick="location.reload()" class="bg-[#21262D] text-[10px] px-3 py-1.5 rounded-md border border-[#30363D]">クリア</button>
    </header>

    <main class="max-w-6xl mx-auto">
        <div id="drop-area" class="border-2 border-dashed border-[#30363D] rounded-2xl p-10 text-center hover:bg-[#161B22] transition-all cursor-pointer">
            <p id="drop-text" class="text-white font-bold text-sm">【最新のExcel】をここにドロップ</p>
            <p class="text-[10px] text-gray-500 mt-2">※5:00:00指定の荷物だけをリアルタイムで抽出します</p>
            <input type="file" id="file-input" class="hidden" accept=".xlsx, .xls, .csv">
        </div>

        <div id="result-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3 mt-6"></div>
    </main>

    <script>
        const fileInput = document.getElementById('file-input');
        const dropArea = document.getElementById('drop-area');
        const statusText = document.getElementById('file-status');

        dropArea.onclick = () => fileInput.click();
        fileInput.onchange = (e) => handleFile(e.target.files[0]);

        function handleFile(file) {
            if (!file) return;
            
            // 画面を一度真っ白にして古いデータを破棄
            document.getElementById('result-grid').innerHTML = '';
            statusText.innerText = `読み込み中: ${file.name}`;
            statusText.classList.add('text-orange-500');

            const reader = new FileReader();
            reader.onload = (ev) => {
                const data = new Uint8Array(ev.target.result);
                const workbook = XLSX.read(data, { type: 'array', cellDates: true });
                const json = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
                
                render(json, file.name);
            };
            reader.readAsArrayBuffer(file);
        }

        function render(data, fileName) {
            const grid = document.getElementById('result-grid');
            grid.innerHTML = ''; // 念押しでクリア

            const summary = {};

            data.forEach(row => {
                const startTimeRaw = row['Scheduled Delivery Start Time'];
                let isTarget = false;

                // 5:00:00 の厳密判定
                if (startTimeRaw instanceof Date) {
                    // Excelが日付として認識している場合
                    if (startTimeRaw.getHours() === 5 && startTimeRaw.getMinutes() === 0) isTarget = true;
                } else {
                    // 文字列として認識している場合
                    const s = String(startTimeRaw || "");
                    if (s.includes("05:00:00") || s.includes(" 5:00:00")) isTarget = true;
                }

                if (isTarget) {
                    const cx = row['Route Code'] || '未割当';
                    const name = row['Last Scan By'] || '不明';
                    const da = row['Tracking ID'] || 'Unknown';

                    if (!summary[cx]) summary[cx] = { name, items: [] };
                    summary[cx].items.push(da);
                }
            });

            const sortedKeys = Object.keys(summary).sort();

            if (sortedKeys.length === 0) {
                grid.innerHTML = `<div class="col-span-full text-center py-10 text-gray-500">
                    ファイル「${fileName}」には<br>5:00:00指定の荷物はありませんでした。</div>`;
            } else {
                sortedKeys.forEach(cx => {
                    const info = summary[cx];
                    const card = document.createElement('div');
                    card.className = 'card-update p-4 rounded-xl shadow-lg';
                    card.innerHTML = `
                        <div class="flex justify-between items-start mb-3 border-b border-[#30363D] pb-2">
                            <div>
                                <h2 class="text-sm font-black text-white italic">${cx} 担当者</h2>
                                <p class="text-[10px] text-gray-500">${info.name}</p>
                            </div>
                            <span class="bg-[#238636] text-white text-[10px] px-2 py-0.5 rounded-full font-bold">5:00指定: ${info.items.length}件</span>
                        </div>
                        <div class="grid grid-cols-1 gap-1">
                            ${info.items.map(da => `<div class="da-tag p-1.5 rounded text-xs text-center">${da}</div>`).join('')}
                        </div>
                    `;
                    grid.appendChild(card);
                });
            }

            statusText.innerText = `完了: ${fileName}`;
            statusText.classList.replace('text-orange-500', 'text-green-500');
            // ファイル選択をリセット（同じファイル名の再選択を可能にする）
            fileInput.value = '';
        }
    </script>
</body>
</html>
