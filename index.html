<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>AMZ-EXP Realtime Monitor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body class="bg-[#0D1117] text-[#C9D1D9] p-4">

    <header class="max-w-6xl mx-auto mb-6 flex justify-between items-center border-b border-[#30363D] pb-4">
        <div>
            <h1 class="text-xl font-black text-white italic uppercase tracking-tighter">5:00:00 <span class="text-blue-500">Status Tracking</span></h1>
            <p id="current-file" class="text-[10px] text-green-500 font-bold mt-1 uppercase">ファイル待機中</p>
        </div>
        <div class="bg-[#161B22] border border-[#30363D] p-2 rounded text-right">
            <span class="text-[9px] block text-gray-500 font-bold">LATEST UPDATE</span>
            <span id="update-time" class="text-xs font-mono">--:--:--</span>
        </div>
    </header>

    <main class="max-w-6xl mx-auto">
        <div id="drop-area" class="border-2 border-dashed border-[#30363D] rounded-2xl p-8 text-center hover:bg-[#161B22] transition-all cursor-pointer mb-6">
            <p class="text-white font-bold text-sm">最新のExcelをここにドロップ</p>
            <input type="file" id="file-input" class="hidden" accept=".xlsx, .xls, .csv">
        </div>

        <div id="result-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3"></div>
    </main>

    <script>
        const fileInput = document.getElementById('file-input');
        const dropArea = document.getElementById('drop-area');

        dropArea.onclick = () => fileInput.click();
        fileInput.onchange = (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (ev) => {
                const data = new Uint8Array(ev.target.result);
                const workbook = XLSX.read(data, { type: 'array', cellDates: true });
                const json = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
                
                document.getElementById('update-time').innerText = new Date().toLocaleTimeString();
                document.getElementById('current-file').innerText = "ACTIVE: " + file.name;
                render(json);
            };
            reader.readAsArrayBuffer(file);
            fileInput.value = '';
        };

        function render(data) {
            const grid = document.getElementById('result-grid');
            grid.innerHTML = ''; 
            const summary = {};

            data.forEach(row => {
                const startTimeKey = Object.keys(row).find(k => k.trim() === 'Scheduled Delivery Start Time');
                const val = row[startTimeKey];
                
                let isMatch = false;
                if (val) {
                    const s = String(val);
                    if (s.includes("05:00:00") || s.includes(" 5:00:00") || (val instanceof Date && val.getHours() === 5)) {
                        isMatch = true;
                    }
                }

                if (isMatch) {
                    const cx = row['Route Code'] || '未割当';
                    const name = row['Last Scan By'] || '不明';
                    const da = row['Tracking ID'] || 'Unknown';
                    const state = row['State'] || '不明'; // 配送ステータスを取得

                    if (!summary[cx]) summary[cx] = { name, items: [] };
                    summary[cx].items.push({ da, state });
                }
            });

            Object.keys(summary).sort().forEach(cx => {
                const info = summary[cx];
                const card = document.createElement('div');
                card.className = 'bg-[#161B22] border border-[#30363D] p-4 rounded-xl shadow-xl';
                
                const itemsHtml = info.items.map(item => {
                    const isDelivered = item.state.includes('Delivered');
                    return `
                        <div class="flex justify-between items-center bg-[#0D1117] p-2 rounded border border-[#30363D] mb-1">
                            <span class="text-[11px] font-mono text-[#58A6FF]">${item.da}</span>
                            <span class="text-[9px] px-1.5 py-0.5 rounded font-bold ${isDelivered ? 'bg-blue-900 text-blue-200' : 'bg-orange-900 text-orange-200'}">
                                ${isDelivered ? '完了' : '配送中'}
                            </span>
                        </div>
                    `;
                }).join('');

                card.innerHTML = `
                    <div class="flex justify-between items-end mb-3 border-b border-[#30363D] pb-2">
                        <h2 class="text-sm font-black text-white italic">${cx} <span class="text-[10px] text-gray-500 not-italic ml-1">${info.name}</span></h2>
                        <span class="text-[10px] text-green-500 font-bold">5:00指定: ${info.items.length}件</span>
                    </div>
                    <div>${itemsHtml}</div>
                `;
                grid.appendChild(card);
            });
        }
    </script>
</body>
</html>
