<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AMZ-EXP Delivery Monitor | Platinum Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        :root { --amz-orange: #FF9900; --bg-dark: #0D1117; }
        body { background-color: var(--bg-dark); color: #C9D1D9; font-family: 'Inter', sans-serif; }
        .priority-am { border-left: 5px solid #F85149; background: linear-gradient(90deg, #2a1215 0%, #161b22 100%); }
        .glass-card { background: rgba(22, 27, 34, 0.8); border: 1px solid #30363D; backdrop-filter: blur(10px); }
        .loader { border-top-color: #FF9900; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="p-4 md:p-8">

    <header class="max-w-7xl mx-auto mb-8 flex justify-between items-end border-b border-gray-800 pb-6">
        <div>
            <h1 class="text-3xl font-black text-white italic tracking-tighter">DELIVERY <span class="text-orange-500">AGGREGATOR</span></h1>
            <p class="text-xs text-gray-500 font-mono">System Architect: TAA Platinum / Version 2.0</p>
        </div>
        <button onclick="location.reload()" class="bg-gray-800 hover:bg-gray-700 text-white px-4 py-2 rounded-lg text-xs font-bold transition-all border border-gray-700">RESET SYSTEM</button>
    </header>

    <main class="max-w-7xl mx-auto">
        <div id="drop-area" class="relative group border-2 border-dashed border-gray-700 rounded-3xl p-16 text-center transition-all hover:border-orange-500 hover:bg-gray-800/30 mb-10">
            <input type="file" id="file-input" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer" accept=".xlsx, .xls, .csv, image/*">
            <div id="drop-content" class="space-y-4">
                <div class="text-6xl group-hover:scale-110 transition-transform duration-300">📊</div>
                <h2 class="text-xl font-bold text-white">エクセル または スクショをドロップ</h2>
                <p class="text-gray-500 text-sm">画像内のDA番号とCX名を自動で紐づけます</p>
            </div>
            <div id="loading-ui" class="hidden flex flex-col items-center space-y-4">
                <div class="loader w-12 h-12 border-4 border-gray-700 rounded-full"></div>
                <p id="loading-text" class="text-orange-500 font-bold animate-pulse">AI OCR ANALYZING...</p>
            </div>
        </div>

        <div id="result-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4"></div>
    </main>

    <script>
        const State = {
            data: [],
            update(newData) {
                this.data = newData;
                this.render();
            },
            render() {
                const grid = document.getElementById('result-grid');
                grid.innerHTML = '';

                // CX（名前）ごとにグループ化
                const grouped = this.data.reduce((acc, item) => {
                    if (!acc[item.cx]) acc[item.cx] = [];
                    acc[item.cx].push(item);
                    return acc;
                }, {});

                Object.entries(grouped).forEach(([name, items]) => {
                    const amCount = items.filter(i => i.isAM).length;
                    const card = document.createElement('div');
                    card.className = `glass-card rounded-2xl p-5 shadow-2xl transition-all hover:translate-y-[-4px] ${amCount > 0 ? 'priority-am' : ''}`;
                    
                    card.innerHTML = `
                        <div class="flex justify-between items-center mb-4 pb-2 border-b border-gray-800">
                            <div>
                                <h3 class="text-lg font-bold text-white">${name}</h3>
                                <p class="text-[10px] text-gray-500 uppercase tracking-widest">Delivery Staff</p>
                            </div>
                            <div class="text-right">
                                <span class="bg-green-600 text-white text-xs font-black px-2 py-1 rounded-full">${items.length}個</span>
                            </div>
                        </div>
                        <div class="flex flex-wrap gap-1">
                            ${items.map(i => `
                                <span class="bg-gray-900 border ${i.isAM ? 'border-red-500 text-red-400' : 'border-gray-700 text-blue-400'} px-2 py-1 rounded font-mono text-xs font-bold">
                                    ${i.da}
                                </span>
                            `).join('')}
                        </div>
                    `;
                    grid.appendChild(card);
                });

                document.getElementById('drop-area').classList.add('hidden');
            }
        };

        const fileInput = document.getElementById('file-input');
        fileInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            toggleLoading(true);

            if (file.type.startsWith('image/')) {
                await handleImage(file);
            } else {
                await handleExcel(file);
            }
            
            toggleLoading(false);
        });

        async function handleImage(file) {
            try {
                const worker = await Tesseract.createWorker('jpn');
                const { data: { text } } = await worker.recognize(file);
                console.log("Raw OCR Text:", text); // デバッグ用

                const parsed = parseOcrText(text);
                if (parsed.length === 0) alert("有効なデータを検出できませんでした。");
                State.update(parsed);
                await worker.terminate();
            } catch (err) {
                console.error(err);
                alert("画像解析中にエラーが発生しました。");
            }
        }

        function parseOcrText(text) {
            // 改行で分割し、不要な空白を除去
            const lines = text.split('\n').map(l => l.trim()).filter(l => l.length > 0);
            const results = [];

            lines.forEach(line => {
                // 正規表現の設計:
                // 1. DA番号: 最初の英数字の塊 (DA... または D4... など)
                // 2. 名前: その後に続く日本語の塊
                const daMatch = line.match(/(DA|D4|da|d4)[\-\s]?([0-9A-Z]+)/i);
                const nameMatch = line.match(/[一-龠ぁ-んァ-ヶ]{2,}/);

                if (daMatch) {
                    const daId = daMatch[0].toUpperCase().replace(/\s/g, '');
                    const cxName = nameMatch ? nameMatch[0] : "未割当";
                    
                    results.push({
                        da: daId,
                        cx: cxName,
                        // 午前指定の判定（例: DA番号に特定の数字が含まれる、またはOCRテキスト内に「午前」がある場合）
                        isAM: line.includes("午前") || line.includes("12") 
                    });
                }
            });
            return results;
        }

        async function handleExcel(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                const json = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], { header: 1 });
                
                const parsed = json.slice(1).map(row => ({
                    da: String(row[0] || "").trim(),
                    cx: String(row[1] || "未割当").trim(),
                    isAM: String(row[0]).includes("午前") // 必要に応じて条件変更
                })).filter(item => item.da);
                
                State.update(parsed);
            };
            reader.readAsArrayBuffer(file);
        }

        function toggleLoading(isLoading) {
            document.getElementById('drop-content').classList.toggle('hidden', isLoading);
            document.getElementById('loading-ui').classList.toggle('hidden', !isLoading);
        }
    </script>
</body>
</html>
