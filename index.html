<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>AMZ-EXP Checker Pro v3</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body class="bg-[#0D1117] text-[#C9D1D9] p-4">

    <header class="max-w-6xl mx-auto mb-6 flex justify-between items-center border-b border-[#30363D] pb-4">
        <div>
            <h1 class="text-xl font-black text-white italic italic uppercase">Time Check <span class="text-green-500 underline">Strict</span></h1>
            <p id="current-file" class="text-[10px] text-orange-500 font-bold mt-1 uppercase tracking-tighter">ファイルを選択してください</p>
        </div>
        <div class="text-right">
            <p class="text-[10px] text-gray-500">Target Time</p>
            <p class="text-sm font-bold text-white">05:00:00</p>
        </div>
    </header>

    <main class="max-w-6xl mx-auto">
        <div id="drop-area" class="border-2 border-dashed border-[#30363D] rounded-2xl p-10 text-center hover:bg-[#161B22] transition-all cursor-pointer">
            <p class="text-white font-bold">ここに最新のExcelをドロップ</p>
            <p class="text-[10px] text-gray-500 mt-2 italic">※読み込むたびに以前のデータは完全に消去されます</p>
            <input type="file" id="file-input" class="hidden" accept=".xlsx, .xls, .csv">
        </div>

        <div id="result-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3 mt-6"></div>
    </main>

    <script>
        const fileInput = document.getElementById('file-input');
        const dropArea = document.getElementById('drop-area');
        const fileStatus = document.getElementById('current-file');
        const grid = document.getElementById('result-grid');

        dropArea.onclick = () => fileInput.click();
        
        fileInput.onchange = (e) => {
            const file = e.target.files[0];
            if (!file) return;

            // 1. 以前の表示を物理的に消去
            grid.innerHTML = '';
            fileStatus.innerText = "LOADING: " + file.name;

            const reader = new FileReader();
            reader.onload = (ev) => {
                const data = new Uint8Array(ev.target.result);
                const workbook = XLSX.read(data, { type: 'array', cellDates: true });
                const json = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
                
                // 2. 解析して描画
                render(json);
                fileStatus.innerText = "ACTIVE: " + file.name;
                fileStatus.classList.replace('text-orange-500', 'text-green-500');
            };
            reader.readAsArrayBuffer(file);
            
            // 3. inputを空にする（同じファイルを再度投げても反応するようにする）
            fileInput.value = '';
        };

        function render(data) {
            const summary = {};

            data.forEach(row => {
                // 列名を特定（スペースが含まれる場合を考慮）
                const startTimeKey = Object.keys(row).find(k => k.trim() === 'Scheduled Delivery Start Time');
                const val = row[startTimeKey];
                
                let isMatch = false;
                if (val) {
                    const s = String(val);
                    // 「05:00:00」という文字列が完全に含まれているか、日付型で5時か
                    if (s.includes("05:00:00") || s.includes(" 5:00:00")) {
                        isMatch = true;
                    } else if (val instanceof Date && val.getHours() === 5) {
                        isMatch = true;
                    }
                }

                if (isMatch) {
                    const cx = row['Route Code'] || '未割当';
                    const name = row['Last Scan By'] || '不明';
                    const da = row['Tracking ID'] || 'Unknown';
                    if (!summary[cx]) summary[cx] = { name, items: [] };
                    summary[cx].items.push(da);
                }
            });

            const keys = Object.keys(summary).sort();
            if (keys.length === 0) {
                grid.innerHTML = '<p class="col-span-full text-center text-gray-500 py-20">このファイルには 05:00:00 指定のデータは存在しません。</p>';
                return;
            }

            keys.forEach(cx => {
                const info = summary[cx];
                const card = document.createElement('div');
                card.className = 'bg-[#161B22] border border-[#30363D] p-4 rounded-xl shadow-xl border-t-4 border-green-600';
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-3 border-b border-[#30363D] pb-2">
                        <div>
                            <h2 class="text-sm font-black text-white italic">${cx}</h2>
                            <p class="text-[10px] text-gray-400 font-bold">${info.name}</p>
                        </div>
                        <span class="bg-green-900 text-green-300 text-[10px] px-2 py-0.5 rounded font-black">5:00指定: ${info.items.length}件</span>
                    </div>
                    <div class="space-y-1">
                        ${info.items.map(da => `<div class="bg-[#0D1117] border border-[#30363D] text-[#58A6FF] text-[11px] p-1.5 rounded font-mono text-center tracking-tighter">${da}</div>`).join('')}
                    </div>
                `;
                grid.appendChild(card);
            });
        }
    </script>
</body>
</html>
