<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TAA-Amazon Delivery Monitor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        :root { --amazon-orange: #FF9900; --bg-dark: #0F172A; }
        body { background-color: var(--bg-dark); color: #E2E8F0; font-family: 'Inter', system-ui, sans-serif; }
        .priority-am { border-left: 6px solid #F87171; background: linear-gradient(90deg, #451a1a 0%, #1e293b 100%); }
        .card-shadow { box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.4); }
        .driver-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1rem; }
    </style>
</head>
<body class="p-4 md:p-8">

    <header class="max-w-7xl mx-auto mb-8 flex justify-between items-center border-b border-slate-700 pb-6">
        <div>
            <h1 class="text-3xl font-black text-white italic tracking-tighter">AMZ-EXP <span class="text-orange-500">MONITOR</span></h1>
            <p class="text-xs text-slate-400 font-mono mt-1">Status: Operational / Engine: TAA-Architect-v1</p>
        </div>
        <div class="flex gap-2">
            <button onclick="location.reload()" class="bg-slate-800 hover:bg-slate-700 text-white px-4 py-2 rounded-lg text-sm font-bold transition-all border border-slate-600">RESET</button>
        </div>
    </header>

    <main class="max-w-7xl mx-auto">
        <section id="drop-area" class="relative group cursor-pointer border-2 border-dashed border-slate-700 rounded-3xl p-12 text-center transition-all hover:border-orange-500 hover:bg-slate-800/50 mb-8">
            <input type="file" id="file-input" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer" accept=".xlsx, .xls, .csv, image/*">
            <div class="space-y-4">
                <div class="text-6xl group-hover:scale-110 transition-transform duration-300">📦</div>
                <div class="text-xl font-bold text-white">Excel / スクショをここにドロップ</div>
                <p class="text-slate-500 text-sm italic">自動的にCX(担当者)とDA(荷物)を紐づけ、午前指定を強調します</p>
            </div>
        </section>

        <div id="stats-bar" class="hidden grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
            </div>

        <div id="result-grid" class="driver-grid"></div>
    </main>

    <script>
        // --- Domain Logic & State ---
        const State = {
            deliveryData: [],
            update(newData) {
                this.deliveryData = newData;
                this.render();
            },
            render() {
                const grid = document.getElementById('result-grid');
                const stats = document.getElementById('stats-bar');
                grid.innerHTML = '';
                
                const grouped = this.deliveryData.reduce((acc, curr) => {
                    if (!acc[curr.cx]) acc[curr.cx] = [];
                    acc[curr.cx].push(curr);
                    return acc;
                }, {});

                Object.entries(grouped).forEach(([cx, packages]) => {
                    const amCount = packages.filter(p => p.isAM).length;
                    const card = document.createElement('div');
                    card.className = `bg-slate-800/50 rounded-2xl p-5 border border-slate-700 card-shadow ${amCount > 0 ? 'priority-am' : ''}`;
                    
                    card.innerHTML = `
                        <div class="flex justify-between items-start mb-4">
                            <div>
                                <h3 class="text-xl font-black text-white">${cx}</h3>
                                <p class="text-[10px] text-slate-500 font-mono uppercase">Assigned Driver</p>
                            </div>
                            <div class="text-right">
                                <span class="bg-orange-500 text-black text-xs font-black px-2 py-1 rounded">Total: ${packages.length}</span>
                                ${amCount > 0 ? `<div class="text-red-400 text-[10px] font-bold mt-1">⚠️ 午前指定: ${amCount}</div>` : ''}
                            </div>
                        </div>
                        <div class="grid grid-cols-3 gap-2">
                            ${packages.map(p => `
                                <div class="bg-slate-900 border ${p.isAM ? 'border-red-500/50' : 'border-slate-700'} p-2 rounded text-center">
                                    <span class="block text-[10px] text-slate-500">DA</span>
                                    <span class="text-sm font-mono font-bold ${p.isAM ? 'text-red-400' : 'text-blue-400'}">${p.da}</span>
                                </div>
                            `).join('')}
                        </div>
                    `;
                    grid.appendChild(card);
                });
                document.getElementById('drop-area').classList.add('hidden');
                stats.classList.remove('hidden');
            }
        };

        // --- File Handling (Excel & Image) ---
        document.getElementById('file-input').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            if (file.type.startsWith('image/')) {
                // スクリーンショット解析 (OCRモック - 本番ではTesseractを稼働)
                alert("画像解析エンジン起動中... (OCRは環境により数秒かかります)");
                processImage(file);
            } else {
                processExcel(file);
            }
        });

        function processExcel(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                const json = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], { header: 1 });
                
                const parsed = json.slice(1).map(row => ({
                    da: String(row[0] || "").trim(),
                    cx: String(row[1] || "未割当").trim(),
                    isAM: String(row[0]).startsWith('8') // AmazonのDA接頭辞ルール等があればここにロジック追加
                })).filter(item => item.da);
                
                State.update(parsed);
            };
            reader.readAsArrayBuffer(file);
        }

        async function processImage(file) {
            // Tesseract.js を利用した簡易OCR実装
            const worker = await Tesseract.createWorker('jpn');
            const ret = await worker.recognize(file);
            console.log(ret.data.text);
            // ここで正規表現を用いて「DA番号」と「名前」を抽出するロジックを実装
            // 今回はデモとして、スクショ内のテキスト傾向からパースするスタブを配置
            alert("OCR完了: テキストを抽出しました。");
            await worker.terminate();
        }
    </script>
</body>
</html>
