<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AMZ-EXP Aggregate Tool | Fixed Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { background-color: #0D1117; color: #C9D1D9; font-family: sans-serif; }
        .priority-am { border-left: 6px solid #F85149; background: linear-gradient(90deg, #2a1215 0%, #161b22 100%); }
        .da-tag { background: #0D1117; border: 1px solid #30363D; color: #58A6FF; font-family: monospace; font-size: 0.8rem; padding: 2px 6px; border-radius: 4px; border: 1px solid #30363D; }
        .loader { border-top-color: #FF9900; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="p-4">

    <header class="max-w-6xl mx-auto mb-6 flex justify-between items-end border-b border-[#30363D] pb-4">
        <div>
            <h1 class="text-xl font-black text-white italic tracking-tighter uppercase">Delivery <span class="text-orange-500">Aggregator</span></h1>
            <p class="text-[10px] text-gray-500 font-bold uppercase">Auto-Mapping & Priority Filter</p>
        </div>
        <button onclick="location.reload()" class="text-[10px] bg-[#30363D] px-2 py-1 rounded">RESET</button>
    </header>

    <main class="max-w-6xl mx-auto">
        <div id="drop-area" class="border-2 border-dashed border-[#30363D] rounded-2xl p-12 text-center hover:bg-[#161B22] transition-all cursor-pointer">
            <div id="idle-view">
                <p class="text-lg font-bold text-white mb-2">Excelファイルをここにドロップ</p>
                <p class="text-xs text-gray-500">「時間指定（絞り込み後）.xlsx」に完全対応</p>
            </div>
            <div id="loading-view" class="hidden">
                <div class="loader w-8 h-8 border-4 border-[#30363D] rounded-full mx-auto mb-2"></div>
                <p class="text-orange-500 font-bold animate-pulse text-xs">PROCESSING EXCEL...</p>
            </div>
            <input type="file" id="file-input" class="hidden" accept=".xlsx, .xls, .csv">
        </div>

        <div id="result-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3 mt-6"></div>
    </main>

    <script>
        const dropArea = document.getElementById('drop-area');
        const fileInput = document.getElementById('file-input');

        dropArea.onclick = () => fileInput.click();
        fileInput.onchange = (e) => handleFile(e.target.files[0]);

        function handleFile(file) {
            if (!file) return;
            document.getElementById('idle-view').classList.add('hidden');
            document.getElementById('loading-view').classList.remove('hidden');

            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, { type: 'array' });
                    const sheet = workbook.Sheets[workbook.SheetNames[0]];
                    const json = XLSX.utils.sheet_to_json(sheet);
                    
                    if (json.length === 0) throw new Error("ファイルが空です");
                    render(json);
                } catch (err) {
                    alert("エラー: " + err.message);
                    location.reload();
                }
            };
            reader.readAsArrayBuffer(file);
        }

        function render(data) {
            const grid = document.getElementById('result-grid');
            grid.innerHTML = '';
            
            // ファイル内の列名を柔軟に取得する（大文字小文字や空白対策）
            const getVal = (row, patterns) => {
                const key = Object.keys(row).find(k => patterns.some(p => k.trim().includes(p)));
                return key ? row[key] : null;
            };

            // CX (Route Code) でグループ化
            const summary = data.reduce((acc, row) => {
                // の列名構造に基づいて抽出
                const cx = getVal(row, ['Route Code', 'Route']) || '未割当';
                const name = getVal(row, ['Last Scan By', '担当者']) || '';
                const da = getVal(row, ['Tracking ID', 'DA']) || '';
                const endTime = String(getVal(row, ['End Time', 'Scheduled Delivery End Time']) || '');
                
                // 午前指定（13:00まで）の判定
                const isAM = endTime.includes('13:00') || endTime.includes('12:00');

                if (!acc[cx]) acc[cx] = { name, items: [] };
                if (da) acc[cx].items.push({ da, isAM });
                return acc;
            }, {});

            Object.entries(summary).sort().forEach(([cx, info]) => {
                const amItems = info.items.filter(i => i.isAM);
                const card = document.createElement('div');
                card.className = `bg-[#161B22] border border-[#30363D] rounded-xl p-4 shadow-xl ${amItems.length > 0 ? 'priority-am' : ''}`;
                
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-3 border-b border-[#30363D] pb-2">
                        <div>
                            <h2 class="text-sm font-black text-white leading-tight">${cx} 担当者</h2>
                            <p class="text-[10px] text-gray-500 font-bold mt-1">${info.name}</p>
                        </div>
                        <div class="text-right">
                            <span class="bg-[#238636] text-white text-[10px] px-2 py-0.5 rounded-full font-bold">合計 ${info.items.length}</span>
                        </div>
                    </div>
                    <div class="grid grid-cols-1 gap-1">
                        ${info.items.map(i => `
                            <div class="da-tag truncate ${i.isAM ? 'border-red-500 text-red-400 bg-red-900/10' : ''}">
                                ${i.isAM ? '🕒 ' : ''}${i.da}
                            </div>
                        `).join('')}
                    </div>
                `;
                grid.appendChild(card);
            });

            document.getElementById('drop-area').classList.add('hidden');
        }
    </script>
</body>
</html>
