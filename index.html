<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Smart Delivery Aggregator Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        body { background-color: #0D1117; color: #C9D1D9; font-family: sans-serif; }
        .driver-group { background: #161B22; border: 1px solid #30363D; border-radius: 12px; margin-bottom: 1rem; overflow: hidden; }
        .group-header { background: #21262D; padding: 12px 16px; border-bottom: 1px solid #30363D; display: flex; justify-between; align-items: center; }
        .da-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 8px; padding: 16px; }
        .da-item { background: #0D1117; border: 1px solid #30363D; color: #58A6FF; font-family: monospace; font-size: 0.8rem; padding: 4px 8px; border-radius: 4px; text-align: center; }
        .loading-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 100; }
        .spinner { width: 40px; height: 40px; border: 4px solid #30363D; border-top-color: #FF9900; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="p-4">

    <div id="loading" class="loading-overlay">
        <div class="spinner mb-4"></div>
        <p class="text-orange-500 font-bold tracking-widest">画像から担当者と荷物を紐付け中...</p>
    </div>

    <header class="max-w-4xl mx-auto mb-6 flex justify-between items-end border-b border-[#30363D] pb-4">
        <div>
            <h1 class="text-xl font-black text-white tracking-tighter uppercase">Delivery <span class="text-orange-500">Aggregator</span></h1>
            <p class="text-[10px] text-gray-500 font-bold">画像ペア解析・担当者別集計モード</p>
        </div>
        <button onclick="location.reload()" class="text-xs bg-[#30363D] text-white px-3 py-1 rounded">リセット</button>
    </header>

    <main class="max-w-4xl mx-auto">
        <div id="drop-zone" class="border-2 border-dashed border-[#30363D] rounded-2xl p-10 text-center cursor-pointer hover:bg-[#161B22] transition-all mb-6">
            <p class="text-gray-400 font-bold">【ここに画像をドロップ】</p>
            <p class="text-[10px] text-gray-600 mt-2 uppercase">解析精度を高めるため、文字がはっきり写った画像を使用してください</p>
            <input type="file" id="file-input" class="hidden" accept="image/*">
        </div>

        <div id="output"></div>
    </main>

    <script>
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const loading = document.getElementById('loading');
        const output = document.getElementById('output');

        dropZone.onclick = () => fileInput.click();

        fileInput.onchange = (e) => handleFile(e.target.files[0]);

        async function handleFile(file) {
            if (!file) return;
            loading.style.display = 'flex';
            output.innerHTML = '';

            try {
                // Tesseractの「hOCR」形式（座標情報付き）を利用して解析
                const worker = await Tesseract.createWorker('jpn');
                const { data } = await worker.recognize(file);
                
                // 行ごとのデータを整理
                const summary = {};

                data.lines.forEach(line => {
                    const text = line.text.trim();
                    // DA番号（英数字）と名前（日本語）を分離
                    // 画像の「左にDA、右に名前」という構造を利用
                    const daMatch = text.match(/(DA|D4|da)[\-\s]?([0-9A-Z]{5,})/i);
                    const nameMatch = text.match(/[一-龠ぁ-んァ-ヶ]{2,}/);

                    if (daMatch) {
                        const daId = daMatch[0].toUpperCase().replace('D4', 'DA').replace(/\s/g, '');
                        const name = nameMatch ? nameMatch[0] : "未割当";

                        if (!summary[name]) summary[name] = [];
                        summary[name].push(daId);
                    }
                });

                render(summary);
                await worker.terminate();
            } catch (err) {
                alert("解析に失敗しました。画像が大きすぎるか、文字が読み取れません。");
                console.error(err);
            } finally {
                loading.style.display = 'none';
            }
        }

        function render(summary) {
            const names = Object.keys(summary).sort();
            
            if (names.length === 0) {
                output.innerHTML = `<p class="text-center text-gray-500">有効なデータを検出できませんでした。</p>`;
                return;
            }

            dropZone.classList.add('hidden');

            names.forEach(name => {
                const das = summary[name];
                const group = document.createElement('div');
                group.className = 'driver-group shadow-xl';
                group.innerHTML = `
                    <div class="group-header">
                        <span class="text-white font-bold text-sm">CX ${name} 担当者</span>
                        <span class="bg-[#238636] text-white text-[10px] px-2 py-0.5 rounded-full font-bold">合計 ${das.length} 個</span>
                    </div>
                    <div class="da-grid">
                        ${das.map(da => `<div class="da-item">${da}</div>`).join('')}
                    </div>
                `;
                output.appendChild(group);
            });
        }
    </script>
</body>
</html>
