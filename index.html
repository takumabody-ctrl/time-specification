<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>5:00 Monitor - Screenshot Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { background-color: #0D1117; color: #C9D1D9; font-family: sans-serif; overflow-x: hidden; }
        .compact-card { background: #161B22; border: 1px solid #30363D; border-top: 3px solid #238636; }
        .status-dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; margin-right: 4px; }
        .dot-delivered { background-color: #238636; box-shadow: 0 0 5px #238636; }
        .dot-transit { background-color: #9e6a03; box-shadow: 0 0 5px #9e6a03; }
        /* スクロールバーを隠す（スクショ用） */
        ::-webkit-scrollbar { width: 0px; }
    </style>
</head>
<body class="p-2">

    <header class="flex justify-between items-center border-b border-[#30363D] pb-1 mb-2">
        <div class="flex items-center gap-3">
            <h1 class="text-lg font-black text-white italic tracking-tighter">5:00 <span class="text-green-500">MONITOR</span></h1>
            <span id="file-name" class="text-[10px] text-gray-500 font-mono truncate max-w-[200px]">NO FILE</span>
        </div>
        <div class="flex gap-2">
            <button onclick="location.reload()" class="bg-red-900/30 text-red-500 text-[10px] px-3 py-1 border border-red-900/50 rounded hover:bg-red-900/50 transition-all font-bold">リセット</button>
            <div id="clock" class="text-xs font-mono bg-[#161B22] px-2 py-1 rounded border border-[#30363D]">00:00:00</div>
        </div>
    </header>

    <main>
        <div id="drop-area" class="border-2 border-dashed border-[#30363D] rounded-lg p-4 text-center hover:bg-[#161B22] cursor-pointer mb-2 transition-all">
            <p id="drop-text" class="text-gray-400 text-xs font-bold">【抽出時】ファイルをドロップ</p>
            <input type="file" id="file-input" class="hidden" accept=".xlsx, .xls, .csv">
        </div>

        <div id="result-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-2"></div>
    </main>

    <script>
        // 時計機能
        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);

        const fileInput = document.getElementById('file-input');
        const dropArea = document.getElementById('drop-area');

        dropArea.onclick = () => fileInput.click();
        fileInput.onchange = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            document.getElementById('file-name').innerText = file.name;
            const reader = new FileReader();
            reader.onload = (ev) => {
                const data = new Uint8Array(ev.target.result);
                const workbook = XLSX.read(data, { type: 'array', cellDates: true });
                const json = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
                render(json);
                // 読み込み後はドロップエリアを最小化してスペースを空ける
                dropArea.classList.replace('p-10', 'p-2');
                document.getElementById('drop-text').innerText = "再読み込みはここをクリック";
            };
            reader.readAsArrayBuffer(file);
            fileInput.value = '';
        };

        function render(data) {
            const grid = document.getElementById('result-grid');
            grid.innerHTML = '';
            const summary = {};

            data.forEach(row => {
                const startTimeKey = Object.keys(row).find(k => k.trim().includes('Scheduled Delivery Start Time'));
                const val = row[startTimeKey];
                
                let isMatch = false;
                if (val) {
                    const s = String(val);
                    if (s.includes("05:00") || (val instanceof Date && val.getHours() === 5)) {
                        isMatch = true;
                    }
                }

                if (isMatch) {
                    const cx = String(row['Route Code'] || '未割当');
                    const name = row['Last Scan By'] || '不明';
                    const state = String(row['State'] || '');
                    if (!summary[cx]) summary[cx] = { name, items: [] };
                    summary[cx].items.push({ state });
                }
            });

            Object.keys(summary).sort((a,b) => (parseInt(a.replace(/\D/g,'')) || 0) - (parseInt(b.replace(/\D/g,'')) || 0)).forEach(cx => {
                const info = summary[cx];
                const deliveredCount = info.items.filter(i => i.state === 'Delivered').length;
                const transitCount = info.items.length - deliveredCount;

                const card = document.createElement('div');
                card.className = 'compact-card p-2 rounded shadow-sm';
                card.innerHTML = `
                    <div class="flex justify-between items-start leading-none mb-1.5">
                        <div>
                            <span class="text-[11px] font-black text-white italic">${cx}</span>
                            <span class="text-[8px] text-gray-500 block">${info.name.substring(0,5)}</span>
                        </div>
                        <div class="text-right">
                            <span class="text-sm font-black text-green-500">${info.items.length}</span>
                            <span class="text-[7px] text-gray-600 block">PKGS</span>
                        </div>
                    </div>
                    <div class="flex flex-wrap gap-1 border-t border-[#30363D] pt-1.5">
                        <div class="flex items-center text-[9px] mr-2">
                            <span class="status-dot dot-delivered"></span>
                            <span class="text-gray-300">${deliveredCount}</span>
                        </div>
                        <div class="flex items-center text-[9px]">
                            <span class="status-dot dot-transit"></span>
                            <span class="text-gray-300">${transitCount}</span>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }
    </script>
</body>
</html>
