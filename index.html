<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>5:00 Exact Filter</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { background-color: #0D1117; color: #C9D1D9; font-family: sans-serif; }
        .exact-5-card { border-top: 4px solid #FF9900; background: #161B22; }
        .da-tag { background: #0D1117; border: 1px solid #30363D; color: #58A6FF; font-family: monospace; font-size: 0.85rem; padding: 4px; border-radius: 4px; text-align: center; }
        .count-badge { background: #FF9900; color: #000; font-size: 10px; padding: 2px 8px; border-radius: 9999px; font-weight: 900; }
    </style>
</head>
<body class="p-4">

    <header class="max-w-6xl mx-auto mb-6 border-b border-[#30363D] pb-4 flex justify-between items-center">
        <div>
            <h1 class="text-xl font-black text-white italic uppercase tracking-tighter">Strict Filter <span class="text-orange-500">5:00 ONLY</span></h1>
            <p class="text-[10px] text-gray-500 font-bold uppercase tracking-widest">開始時間が「5:00」のデータのみを抽出</p>
        </div>
        <button onclick="location.reload()" class="text-[10px] bg-[#30363D] px-3 py-1.5 rounded hover:bg-[#444c56] transition-all">リセット</button>
    </header>

    <main class="max-w-6xl mx-auto">
        <div id="drop-area" class="border-2 border-dashed border-[#30363D] rounded-2xl p-12 text-center hover:border-orange-500 hover:bg-[#161B22]/50 transition-all cursor-pointer mb-8">
            <div class="text-4xl mb-2">🎯</div>
            <p class="text-white font-bold">Excelをドロップして「5:00」を厳密抽出</p>
            <input type="file" id="file-input" class="hidden" accept=".xlsx, .xls, .csv">
        </div>

        <div id="result-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
    </main>

    <script>
        const fileInput = document.getElementById('file-input');
        const dropArea = document.getElementById('drop-area');

        dropArea.onclick = () => fileInput.click();
        fileInput.onchange = (e) => handleFile(e.target.files[0]);

        function handleFile(file) {
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                const json = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
                filterStrictFiveAM(json);
            };
            reader.readAsArrayBuffer(file);
        }

        function filterStrictFiveAM(data) {
            const grid = document.getElementById('result-grid');
            grid.innerHTML = '';

            // 開始時間が「05:00」に完全一致するものをグループ化
            const summary = data.reduce((acc, row) => {
                const startTime = String(row['Scheduled Delivery Start Time'] || "");
                
                // 「05:00:00」または「5:00」を厳密にチェック
                if (startTime.includes("05:00") || startTime.includes(" 5:00")) {
                    const cx = row['Route Code'] || '未割当';
                    const name = row['Last Scan By'] || '担当者名なし';
                    const da = row['Tracking ID'] || 'Unknown';

                    if (!acc[cx]) acc[cx] = { name, items: [] };
                    acc[cx].items.push(da);
                }
                return acc;
            }, {});

            const entries = Object.entries(summary).sort();

            if (entries.length === 0) {
                grid.innerHTML = '<p class="text-center text-gray-500 col-span-full py-10">開始時間が「5:00」の荷物は現在ありません。</p>';
                return;
            }

            entries.forEach(([cx, info]) => {
                const card = document.createElement('div');
                card.className = 'exact-5-card p-4 rounded-xl shadow-xl';
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-4 border-b border-[#30363D] pb-2">
                        <div>
                            <h2 class="text-sm font-black text-white italic tracking-tighter">${cx} 担当者</h2>
                            <p class="text-[10px] text-gray-500 font-bold mt-0.5">${info.name}</p>
                        </div>
                        <div class="text-right">
                            <span class="count-badge">5:00指定: ${info.items.length}件</span>
                        </div>
                    </div>
                    <div class="grid grid-cols-1 gap-1">
                        ${info.items.map(da => `<div class="da-tag">${da}</div>`).join('')}
                    </div>
                `;
                grid.appendChild(card);
            });

            dropArea.classList.add('hidden');
        }
    </script>
</body>
</html>
