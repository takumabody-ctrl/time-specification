<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>15:00 Priority Aggregator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { background-color: #0D1117; color: #C9D1D9; font-family: sans-serif; }
        .priority-card { border-top: 4px solid #F85149; background: #161B22; }
        .da-tag { background: #0D1117; border: 1px solid #30363D; color: #FF9900; font-family: monospace; font-size: 0.85rem; padding: 4px; border-radius: 4px; text-align: center; }
    </style>
</head>
<body class="p-4">

    <header class="max-w-6xl mx-auto mb-6 border-b border-[#30363D] pb-4">
        <h1 class="text-xl font-black text-white italic uppercase">15:00 <span class="text-red-500">Priority</span> Filter</h1>
        <p class="text-[10px] text-gray-500 font-bold uppercase">5:00〜15:00の荷物のみを抽出中</p>
    </header>

    <main class="max-w-6xl mx-auto">
        <div id="drop-area" class="border-2 border-dashed border-[#30363D] rounded-2xl p-10 text-center hover:bg-[#161B22] transition-all cursor-pointer mb-6">
            <p class="text-white font-bold">Excelファイルをドロップして抽出開始</p>
            <input type="file" id="file-input" class="hidden" accept=".xlsx, .xls, .csv">
        </div>

        <div id="result-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
    </main>

    <script>
        const fileInput = document.getElementById('file-input');
        const dropArea = document.getElementById('drop-area');

        dropArea.onclick = () => fileInput.click();
        fileInput.onchange = (e) => handleFile(e.target.files[0]);

        function handleFile(file) {
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                const json = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
                process(json);
            };
            reader.readAsArrayBuffer(file);
        }

        function process(data) {
            const grid = document.getElementById('result-grid');
            grid.innerHTML = '';

            // 15:00までのデータを抽出し、CXごとにグループ化
            const summary = data.reduce((acc, row) => {
                const endTime = String(row['Scheduled Delivery End Time'] || "");
                const startTime = String(row['Scheduled Delivery Start Time'] || "");
                
                // 「13:00」や「14:00」「15:00」が含まれる、かつ「5:00」開始のものなどを判定
                // 15時以前（15:00:00以下）のデータを抽出
                const isTargetTime = (endTime.includes("12:00") || endTime.includes("13:00") || endTime.includes("14:00") || endTime.includes("15:00"));

                if (isTargetTime) {
                    const cx = row['Route Code'] || '未割当';
                    const name = row['Last Scan By'] || '不明';
                    const da = row['Tracking ID'] || 'Unknown';

                    if (!acc[cx]) acc[cx] = { name, items: [] };
                    acc[cx].items.push(da);
                }
                return acc;
            }, {});

            const entries = Object.entries(summary).sort();

            if (entries.length === 0) {
                grid.innerHTML = '<p class="text-center text-gray-500 col-span-full">対象の時間帯（15:00まで）の荷物は見つかりませんでした。</p>';
                return;
            }

            entries.forEach(([cx, info]) => {
                const card = document.createElement('div');
                card.className = 'priority-card p-4 rounded-xl shadow-2xl';
                card.innerHTML = `
                    <div class="flex justify-between items-center mb-3 border-b border-[#30363D] pb-2">
                        <div>
                            <h2 class="text-sm font-black text-white italic">${cx} 担当者</h2>
                            <p class="text-[10px] text-gray-500 font-bold">${info.name}</p>
                        </div>
                        <div class="bg-red-600 text-white text-[10px] px-2 py-0.5 rounded-full font-black">
                            15:00迄: ${info.items.length}件
                        </div>
                    </div>
                    <div class="grid grid-cols-1 gap-1.5">
                        ${info.items.map(da => `<div class="da-tag">${da}</div>`).join('')}
                    </div>
                `;
                grid.appendChild(card);
            });

            dropArea.classList.add('hidden');
        }
    </script>
</body>
</html>
